name = "social-manager"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true

# Workers Paid plan — opt into the full 30s CPU budget. Default on Paid is
# already 30000ms but stating it explicitly makes the dependency obvious to
# anyone reading wrangler.toml (and locks the upper bound if Cloudflare ever
# changes the default).
[limits]
cpu_ms = 30000

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── D1 binding ────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "social-manager"
database_id = "750d454e-c01f-4a68-a96e-2faee4fa5d4d"
migrations_dir = "drizzle/migrations"

# ── Env vars (non-secret). Secrets via `wrangler secret put` or GH Actions.
[vars]
APP_RUNTIME = "cloudflare"
INITIAL_ADMIN_USERNAME = "admin"
